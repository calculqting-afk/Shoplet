<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Shoplet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/responsive.css" rel="stylesheet">
  <link href="css/animations.css" rel="stylesheet">
</head>
<body class="auth-page" data-page="login">
  <main class="auth-card fade-in-up">
    <a class="brand-mark" href="index.html">
      <span><i class="bi bi-bag-check-fill"></i></span>
      Shoplet
    </a>
    <h1>Login</h1>
    <p>Choose the account type you want to open.</p>
    <form class="stacked-form" id="loginForm">
      <div class="row g-2">
        <div class="col-6">
          <input class="btn-check" type="radio" name="role" id="roleCustomer" value="customer" checked>
          <label class="btn btn-outline-primary w-100" for="roleCustomer">Customer</label>
        </div>
        <div class="col-6">
          <input class="btn-check" type="radio" name="role" id="roleStaff" value="staff">
          <label class="btn btn-outline-primary w-100" for="roleStaff">Staff</label>
        </div>
      </div>
      <div>
        <label class="form-label" for="email">Email</label>
        <input class="form-control" id="email" name="email" type="email" value="customer@shoplet.local" required>
      </div>
      <div>
        <label class="form-label" for="password">Password</label>
        <input class="form-control" id="password" name="password" type="password" value="customer123" required>
      </div>
      <div class="alert alert-danger d-none" id="loginAlert"></div>
      <button class="btn btn-primary btn-lg" type="submit">Login</button>
      <div class="small text-muted">
        Customer: customer@shoplet.local / customer123<br>
        Staff: admin@shoplet.local / admin123
      </div>
      <a class="btn btn-light" href="register.html">Create Customer Account</a>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/login.js"></script>
  <script src="js/transitions.js"></script>
</body>
</html>
