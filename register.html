<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | Shoplet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/responsive.css" rel="stylesheet">
  <link href="css/animations.css" rel="stylesheet">
</head>
<body class="auth-page" data-page="register">
  <main class="auth-card fade-in-up">
    <a class="brand-mark" href="index.html">
      <span><i class="bi bi-bag-check-fill"></i></span>
      Shoplet
    </a>
    <h1>Create account</h1>
    <p>Create a customer or staff account.</p>
    <form class="stacked-form" id="registerForm">
      <div>
        <label class="form-label" for="role">Account Type</label>
        <select class="form-select" id="role" name="role" required>
          <option value="customer">Customer</option>
          <option value="staff">Staff</option>
        </select>
      </div>
      <div>
        <label class="form-label" for="name">Full Name</label>
        <input class="form-control" id="name" name="name" required>
      </div>
      <div>
        <label class="form-label" for="email">Email</label>
        <input class="form-control" id="email" name="email" type="email" required>
      </div>
      <div>
        <label class="form-label" for="password">Password</label>
        <input class="form-control" id="password" name="password" type="password" minlength="6" required>
      </div>
      <div>
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input class="form-control" id="confirmPassword" name="confirmPassword" type="password" minlength="6" required>
      </div>
      <div class="alert alert-danger d-none" id="registerAlert"></div>
      <button class="btn btn-primary btn-lg" type="submit">Create Account</button>
      <a class="btn btn-light" href="login.html">Already have an account</a>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/login.js"></script>
  <script src="js/transitions.js"></script>
</body>
</html>
