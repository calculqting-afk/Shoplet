<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout | Shoplet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/dashboard.css" rel="stylesheet">
  <link href="css/responsive.css" rel="stylesheet">
  <link href="css/animations.css" rel="stylesheet">
</head>
<body class="dashboard-body" data-checkout-page>
  <nav class="navbar navbar-expand-lg fixed-top shoplet-navbar">
    <div class="container">
      <a class="navbar-brand brand-mark" href="explore.html"><span><i class="bi bi-bag-check-fill"></i></span>Shoplet</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#checkoutNav" aria-controls="checkoutNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="checkoutNav">
        <div class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <a class="nav-link" href="explore.html">Home</a>
          <a class="nav-link" href="cart.html">Cart <span class="badge text-bg-danger" data-cart-count>0</span></a>
          <a class="nav-link" href="orders.html">Orders</a>
          <a class="nav-link" href="profile.html">Profile</a>
          <button class="btn btn-light" data-logout>Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="dashboard-main">
    <div class="container">
      <div class="section-heading">
        <div>
          <span class="eyebrow">Checkout</span>
          <h1 class="h2 fw-black">Complete your order</h1>
        </div>
      </div>
      <div class="row g-4">
        <div class="col-12 col-lg-7">
          <form class="content-panel p-4 stacked-form" id="checkoutForm">
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label" for="fullName">Full Name</label>
                <input class="form-control" id="fullName" name="fullName" required>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" name="email" type="email" required>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label" for="phone">Phone Number</label>
                <input class="form-control" id="phone" name="phone" required>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label" for="payment">Payment Method</label>
                <select class="form-select" id="payment" name="payment" required>
                  <option value="Cash on Delivery">Cash on Delivery</option>
                  <option value="E-Wallet">E-Wallet</option>
                  <option value="Card Simulation">Card Simulation</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label" for="address">Delivery Address</label>
                <textarea class="form-control" id="address" name="address" rows="4" required></textarea>
              </div>
            </div>
            <button class="btn btn-primary btn-lg" type="submit">
              <i class="bi bi-shield-check"></i>
              Place Order
            </button>
          </form>
        </div>
        <div class="col-12 col-lg-5">
          <div class="content-panel p-3 mb-3">
            <h2 class="h5 fw-bold mb-3">Items</h2>
            <div id="checkoutItems"></div>
          </div>
          <div id="checkoutTotals"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/transitions.js"></script>
</body>
</html>
