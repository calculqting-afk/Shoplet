<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order Management | Shoplet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
  <link href="../css/admin.css" rel="stylesheet">
  <link href="../css/responsive.css" rel="stylesheet">
  <link href="../css/animations.css" rel="stylesheet">
</head>
<body class="admin-body" data-admin-page="orders">
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <a class="brand-mark" href="dashboard.html">
        <span><i class="bi bi-bag-check-fill"></i></span>
        Shoplet
      </a>
      <nav class="admin-nav" aria-label="Admin navigation">
        <a href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
        <a class="active" href="orders.html"><i class="bi bi-receipt"></i>Orders</a>
        <a href="inventory.html"><i class="bi bi-box-seam"></i>Inventory</a>
        <a href="analytics.html"><i class="bi bi-graph-up"></i>Analytics</a>
        <button data-logout data-redirect="../index.html"><i class="bi bi-box-arrow-right"></i>Logout</button>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <div>
          <h1>Order Management</h1>
          <p>Process customer orders and update shipping status.</p>
        </div>
        <span class="status-pill">LocalStorage Sync</span>
      </header>

      <section class="row g-3 mb-4" id="adminOrderStats"></section>

      <section class="admin-panel">
        <h2>All Customer Orders</h2>
        <div class="table-responsive">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>Product Bought</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Date</th>
                <th>Update</th>
              </tr>
            </thead>
            <tbody id="adminOrdersTable"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/admin.js"></script>
  <script src="../js/transitions.js"></script>
</body>
</html>
